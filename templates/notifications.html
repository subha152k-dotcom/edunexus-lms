<!DOCTYPE html>
<html>
<head>

<title>Notifications</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

/* glass navbar */

.navbar-glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* notification card */

.notification-box{
background:rgba(0,255,180,0.1);
border-left:4px solid #00ffa6;
padding:15px;
border-radius:12px;
margin-bottom:12px;
transition:0.3s;
}

.notification-box:hover{
transform:translateX(6px);
box-shadow:0 8px 20px rgba(0,255,180,0.3);
}

/* time */

.time{
color:#ddd;
font-size:13px;
}

</style>

</head>

<body>

<!-- GLASS NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-glass">
<div class="container">

<a class="navbar-brand text-white fw-bold" href="/">EduNexus</a>

<div>

<a class="btn btn-light btn-sm" href="/my-courses/">My Courses</a>

<a class="btn btn-warning btn-sm" href="/plans/">Plans</a>

<a class="btn btn-info btn-sm" href="/notifications/">Notifications</a>

<a class="btn btn-success btn-sm" href="/dashboard/">Analytics</a>

</div>

</div>
</nav>


<div class="container mt-4">

<h2 class="mb-4">My Notifications</h2>

{% for n in notes %}

<div class="notification-box">

<p class="mb-1">

{{ n.message }}

</p>

<span class="time">

{{ n.created_at }}

</span>

</div>

{% empty %}

<p>No notifications</p>

{% endfor %}

</div>

</body>
</html>
