<!DOCTYPE html>
<html>
<head>

<title>Live Chat</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

.navbar-glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.2);
}

.chat-card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:16px;
padding:20px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

#chat-box{
height:350px;
overflow-y:auto;
background:rgba(255,255,255,0.1);
padding:15px;
border-radius:12px;
margin-bottom:15px;
}

input{
background:rgba(255,255,255,0.15)!important;
border:none!important;
color:white!important;
}

.btn-send{
background:#00ffa6;
border:none;
color:black;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-glass">
<div class="container">
<a class="navbar-brand text-white fw-bold" href="/">EduNexus</a>

<div>
<a class="btn btn-light btn-sm" href="/my-courses/">My Courses</a>
<a class="btn btn-warning btn-sm" href="/plans/">Plans</a>
<a class="btn btn-info btn-sm" href="/notifications/">Notifications</a>
<a class="btn btn-success btn-sm" href="/dashboard/">Analytics</a>
</div>

</div>
</nav>

<!-- CHAT -->
<div class="container mt-5">
<div class="chat-card">

<h3>💬 Live Chat</h3>

<!-- CHAT BOX -->
<div id="chat-box"></div>

<!-- INPUT -->
<input type="text" id="message" class="form-control" placeholder="Type message...">

<!-- BUTTON -->
<button onclick="sendMessage()" class="btn btn-send mt-3 w-100">
Send Message
</button>

<!-- FILE -->
<div class="mt-3">
<input type="file" id="fileInput" class="form-control">
<button onclick="sendFile()" class="btn btn-send mt-2 w-100">
Send File
</button>
</div>

</div>
</div>

<!-- SCRIPT -->

<script>

const username = prompt("Enter your name") || "User";

// ========= SEND MESSAGE =========


function sendMessage() {

    const input = document.getElementById("message");

    if (input.value.trim() === "") return;

    fetch("/send-message/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCookie("csrftoken")
        },
        body: "message=" + input.value + "&user=" + username
    });

    input.value = "";
}

// ========= SEND FILE =========

function sendFile() {

    const fileInput = document.getElementById("fileInput");
    const file = fileInput.files[0];

    if (!file) return;

    const reader = new FileReader();

    reader.onload = function () {

        fetch("/send-message/", {
            method: "POST",
            headers: {
                "Content-Type": "application/x-www-form-urlencoded",
                "X-CSRFToken": getCookie("csrftoken")
            },
            body: "message=" + reader.result + "&user=" + username
        });

    };

    reader.readAsDataURL(file);
}

// ========= LOAD MESSAGES =========
setInterval(() => {

    fetch("/get-messages/")
    .then(res => res.json())
    .then(data => {

        const box = document.getElementById("chat-box");
        box.innerHTML = "";

        data.messages.forEach(msg => {

            let currentUser = username.trim().toLowerCase();
            let messageUser = (msg.user || "").trim().toLowerCase();

            let isMe = currentUser === messageUser;

            // ========= IMAGE =========

            if (msg.message.startsWith("data:image")) {

                if (isMe) {

                    box.innerHTML += `
                        <div style="display:flex; justify-content:flex-end;">
                            <div style="text-align:right;">
                                <div style="font-size:12px; margin-bottom:3px;">
                                    ${msg.user}:
                                </div>
                                <img src="${msg.message}" 
                                     style="max-width:180px; border-radius:12px; margin:5px;">
                            </div>
                        </div>
                    `;

                } else {

                    box.innerHTML += `
                        <div style="display:flex; justify-content:flex-start;">
                            <div style="text-align:left;">
                                <div style="font-size:12px; margin-bottom:3px;">
                                    ${msg.user}:
                                </div>
                                <img src="${msg.message}" 
                                     style="max-width:180px; border-radius:12px; margin:5px;">
                            </div>
                        </div>
                    `;
                }

            } 
            // ========= TEXT =========
            else {

                if (isMe) {

                    box.innerHTML += `
                        <div style="display:flex; justify-content:flex-end;">
                            <div style="
                                max-width:75%;
                                background:#00ffa6;
                                color:black;
                                padding:12px 16px;
                                border-radius:16px;
                                margin:6px;
                                font-size:15px;
                                word-wrap:break-word;
                            ">
                                ${msg.user}: ${msg.message}
                            </div>
                        </div>
                    `;

                } else {

                    box.innerHTML += `
                        <div style="display:flex; justify-content:flex-start;">
                            <div style="
                                max-width:75%;
                                background:#ffffff;
                                color:black;
                                padding:12px 16px;
                                border-radius:16px;
                                margin:6px;
                                font-size:15px;
                                word-wrap:break-word;
                            ">
                                ${msg.user}: ${msg.message}
                            </div>
                        </div>
                    `;
                }
            }

        });

        // AUTO SCROLL

        box.scrollTop = box.scrollHeight;

    });

}, 1000);


// ========= CSRF =========
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie) {
        const cookies = document.cookie.split(';');
        for (let cookie of cookies) {
            cookie = cookie.trim();
            if (cookie.startsWith(name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            }
        }
    }
    return cookieValue;
}

</script>


</body>
</html>
