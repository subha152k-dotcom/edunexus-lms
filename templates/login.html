<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

/* glass login box */

.login-box{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
padding:40px;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
width:130%;
max-width:490px;
}

/* title */

.login-title{
text-align:center;
margin-bottom:25px;
font-weight:600;
}

/* inputs */

.form-control{
background:rgba(255,255,255,0.15);
border:none;
color:white;
}

.form-control::placeholder{
color:#ddd;
}

/* buttons */

.btn-primary{
background:#0096ff;
border:none;
font-weight:500;
}

.btn-primary:hover{
background:#0075cc;
}

</style>

</head>
<body>

<div class="login-box">

<h3 class="login-title">EduNexus Login</h3>

<form method="post" action="/login/" id="loginForm">
{% csrf_token %}
<div class="mb-3">
<label class="form-label">Username</label>
<input type="text" name="username" class="form-control">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" name="password" class="form-control">
</div>

<button type="submit" class="btn btn-primary w-100">
Login
</button>


</form>

<hr>

<!-- OTP SECTION -->

<input type="email" id="email" placeholder="Enter Email" class="form-control mt-2">

<button onclick="sendOTP()" class="btn btn-success w-100 mt-2">
Send OTP
</button>

<input type="text" id="otp" placeholder="Enter OTP" class="form-control mt-2">

<button onclick="verifyOTP()" class="btn btn-primary w-100 mt-2">
Verify OTP Login
</button>

<hr>

<!-- SOCIAL LOGIN -->

<button onclick="googleLogin()" class="btn btn-danger w-100 mt-2">
Login with Google
</button>

<button onclick="facebookLogin()" class="btn btn-primary w-100 mt-2">
Login with Facebook
</button>

<button onclick="githubLogin()" class="btn btn-dark w-100 mt-2">
Login with GitHub
</button>

<!-- TOKEN DISPLAY -->



</div>

</body>
<script>
function sendOTP(){
    let email = document.getElementById("email").value;

    fetch("/auth/send-otp", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({email: email})
    })
    .then(res=>res.json())
    .then(data=>{
        alert("OTP Sent ✅");
    });
}


//  VERIFY OTP 
function verifyOTP(){
    let email = document.getElementById("email").value;
    let otp = document.getElementById("otp").value;

    fetch("/auth/verify-otp", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({email: email, otp: otp})
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.access_token){

            alert("OTP Verified ✅");

            
            window.location.href = "/";

        }else{
            alert("Invalid OTP ❌");
        }
    });
}


//  GOOGLE LOGIN

function googleLogin(){

    fetch("/auth/google-login", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            email: "demo@gmail.com",
            google_id: "123"
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.access_token){
            alert("Google Login Success ");
            window.location.href = "/";
        }
    });

}


//  FACEBOOK LOGIN

function facebookLogin(){

    fetch("/auth/facebook-login", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            email: "fb@gmail.com",
            facebook_id: "111"
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.access_token){
            alert("Facebook Login Success ");
            window.location.href = "/";
        }
    });

}


//  GITHUB LOGIN

function githubLogin(){

    fetch("/auth/github-login", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            email: "git@gmail.com",
            github_id: "222"
        })
    })
    .then(res=>res.json())
    .then(data=>{
        if(data.access_token){
            alert("GitHub Login Success ");
            window.location.href = "/";
        }
    });

}
</script>

</body>
</html>
