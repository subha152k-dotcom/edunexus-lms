<!DOCTYPE html>
<html>
<head>

<title>Subscription Plans</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

/* glass navbar */

.navbar-glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* plan card */

.plan-card{
background:rgba(0,255,180,0.1);
border-left:4px solid #00ffa6;
border-radius:15px;
padding:30px;
text-align:center;
transition:0.3s;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

.plan-card:hover{
transform:translateY(-8px);
box-shadow:0 12px 28px rgba(0,255,180,0.3);
}

/* price */

.plan-price{
font-size:42px;
font-weight:bold;
margin:15px 0;
color:#00ffa6;
}

/* popular */

.best-plan{
border:3px solid #0096ff;
transform:scale(1.05);
}

/* badge */

.badge-popular{
background:#0096ff;
color:white;
font-weight:bold;
padding:6px 14px;
border-radius:20px;
font-size:12px;
}

/* buttons */

.btn-primary{
background:#0096ff;
border:none;
}

.btn-success{
background:#00ffa6;
border:none;
color:black;
}

</style>

</head>

<body>

<!-- GLASS NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-glass">
<div class="container">

<a class="navbar-brand text-white fw-bold" href="/">EduNexus</a>

<div>

<a class="btn btn-light btn-sm" href="/my-courses/">My Courses</a>

<a class="btn btn-warning btn-sm" href="/plans/">Plans</a>

<a class="btn btn-info btn-sm" href="/notifications/">Notifications</a>

<a class="btn btn-success btn-sm" href="/dashboard/">Analytics</a>

</div>

</div>
</nav>


<div class="container mt-5">

<h2 class="text-center mb-5">
Choose Your Plan
</h2>

<div class="row g-4">

<!-- BASIC -->

<div class="col-md-4">

<div class="plan-card">

<h4>Basic</h4>

<div class="plan-price">₹500</div>

<p>30 Days Access</p>

{% if subscribed %}

<button class="btn btn-secondary w-100">
Already Subscribed
</button>

{% else %}

<a href="/subscribe/1/" class="btn btn-primary w-100">
Subscribe
</a>

{% endif %}

</div>

</div>


<!-- PRO -->

<div class="col-md-4">

<div class="plan-card best-plan">

<span class="badge-popular">
<i class="bi bi-star-fill"></i> Most Popular
</span>

<h4 class="mt-3">Pro</h4>

<div class="plan-price">₹1000</div>

<p>60 Days Access</p>

<button class="btn btn-warning w-100">
Subscribe
</button>

</div>

</div>


<!-- ENTERPRISE -->

<div class="col-md-4">

<div class="plan-card">

<h4>Enterprise</h4>

<div class="plan-price">₹2000</div>

<p>90 Days Access</p>

<button class="btn btn-dark w-100">
Subscribe
</button>

</div>

</div>

</div>

</div>

</body>
</html>
