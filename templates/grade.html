<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grade Assignment</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
min-height:100vh;
}

/* navbar */

.navbar-glass{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,0.2);
}

/* card */

.glass-card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:16px;
padding:25px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

/* input */

input{
background:rgba(255,255,255,0.15)!important;
border:none!important;
color:white!important;
height:45px;
}

/* button */

.btn-main{
background:#00ffa6;
border:none;
color:black;
}

/* layout */

.container{
max-width:900px;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-glass py-3">
<div class="container">
<a class="navbar-brand text-white fw-bold fs-4" href="/">EduNexus</a>
</div>
</nav>

<!-- MAIN -->

<div class="container mt-5">

<div class="glass-card">

<h3 class="mb-4">Grade Assignment</h3>

<form method="post">
{% csrf_token %}

<div class="row g-3">

<div class="col-md-3">
<input name="username" placeholder="Username" class="form-control">
</div>

<div class="col-md-3">
<input name="title" placeholder="Assignment Title" class="form-control">
</div>

<div class="col-md-3">
<input name="grade" placeholder="Grade" class="form-control">
</div>

<div class="col-md-3 d-flex align-items-end">
<button class="btn btn-main w-100">
Grade
</button>
</div>

</div>

</form>

<hr class="mt-4">

<h4>Graded Assignments</h4>

{% for g in graded %}
<div class="mt-2 p-2" style="background:rgba(255,255,255,0.1); border-radius:10px;">
{{ g.username }} - {{ g.title }} - {{ g.grade }}
</div>
{% empty %}
<p>No graded assignments yet</p>
{% endfor %}

</div>

</div>

</body>
</html>
